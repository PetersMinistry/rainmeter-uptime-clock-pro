[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
ContextTitle=#LangControlContextClose#
ContextAction=[!DeactivateConfig "#ROOTCONFIG#\Control"]
Group=UptimeClockPro

[Metadata]
Name=Uptime Clock Pro - Control
Author=PetersMinistry
Information=Control and weather settings block for the integrated Uptime Clock Pro anchor.
Version=0.6.0
License=MIT

[Variables]
FontText=Segoe UI Semilight
TextColor=245,247,252,246
MutedText=165,174,188,224
SoftText=205,212,224,238
PanelFill=5,9,15,244
PanelEdge=255,255,255,44
PanelEdgeStrong=255,255,255,68
Accent=255,215,30,255
AccentSoft=255,215,30,76
InputFill=255,255,255,18
InputHover=255,255,255,32
Language=en
LanguageId=1
SettingsInc=#@#UserSettings.inc
@Include=#SettingsInc#
@IncludeLanguage=#@#Languages\#Language#.inc
LocationURL=https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=#WeatherLatitude#&lon=#WeatherLongitude#&zoom=10&addressdetails=1&accept-language=#Language#


[StyleText]
FontFace=#FontText#
FontColor=#TextColor#
AntiAlias=1

[StyleSmall]
MeterStyle=StyleText
FontSize=10
FontColor=#SoftText#

[StyleTiny]
MeterStyle=StyleText
FontSize=8
FontColor=#MutedText#

[MeasureLatitudeInput]
Measure=Plugin
Plugin=InputText
X=38
Y=188
W=110
H=24
FontFace=#FontText#
FontSize=10
FontColor=#TextColor#
SolidColor=25,30,38,245
InputNumber=1
TopMost=1
FocusDismiss=0
DefaultValue=#WeatherLatitude#
DynamicVariables=1
Command1=[!WriteKeyValue Variables WeatherLatitude "$UserInput$" "#SettingsInc#"][!Refresh "#ROOTCONFIG#\Clock"][!Refresh "#ROOTCONFIG#\Control"]

[MeasureLongitudeInput]
Measure=Plugin
Plugin=InputText
X=162
Y=188
W=110
H=24
FontFace=#FontText#
FontSize=10
FontColor=#TextColor#
SolidColor=25,30,38,245
InputNumber=1
TopMost=1
FocusDismiss=0
DefaultValue=#WeatherLongitude#
DynamicVariables=1
Command1=[!WriteKeyValue Variables WeatherLongitude "$UserInput$" "#SettingsInc#"][!Refresh "#ROOTCONFIG#\Clock"][!Refresh "#ROOTCONFIG#\Control"]

[MeasureLocationCity]
Measure=WebParser
URL=#LocationURL#
RegExp=(?si).*"(?:city|town|village|municipality|hamlet|suburb)"\s*:\s*"([^"]+)".*
StringIndex=1
Substitute="^$":"#LangCoordinatesSaved#"
DefaultValue=#LangCoordinatesSaved#
UserAgent=UptimeClockPro/0.4 (Rainmeter; PetersMinistry)
DynamicVariables=1

[MeasureLocationState]
Measure=WebParser
URL=#LocationURL#
RegExp=(?si).*"state"\s*:\s*"([^"]+)".*
StringIndex=1
Substitute="^$":""
DefaultValue=
UserAgent=UptimeClockPro/0.4 (Rainmeter; PetersMinistry)
DynamicVariables=1

[MeasureLocationCountry]
Measure=WebParser
URL=#LocationURL#
RegExp=(?si).*"country"\s*:\s*"([^"]+)".*
StringIndex=1
Substitute="^$":""
DefaultValue=
UserAgent=UptimeClockPro/0.4 (Rainmeter; PetersMinistry)
DynamicVariables=1

[MeasureLayoutCinematicActive]
Measure=Calc
Formula=(#LayoutId#=1) ? 1 : 0
IfCondition=(MeasureLayoutCinematicActive=1)
IfTrueAction=[!SetOption BtnLayoutCinematic Shape "Rectangle 0,0,86,24,6 | Fill Color #AccentSoft# | StrokeWidth 1 | Stroke Color #Accent#"][!SetOption TxtLayoutCinematic FontColor "#TextColor#"]
IfFalseAction=[!SetOption BtnLayoutCinematic Shape "Rectangle 0,0,86,24,6 | Fill Color 255,255,255,12 | StrokeWidth 1 | Stroke Color #PanelEdge#"][!SetOption TxtLayoutCinematic FontColor "#MutedText#"]
IfConditionMode=1
DynamicVariables=1

[MeasureLayoutWeatherActive]
Measure=Calc
Formula=(#LayoutId#=2) ? 1 : 0
IfCondition=(MeasureLayoutWeatherActive=1)
IfTrueAction=[!SetOption BtnLayoutWeather Shape "Rectangle 0,0,86,24,6 | Fill Color #AccentSoft# | StrokeWidth 1 | Stroke Color #Accent#"][!SetOption TxtLayoutWeather FontColor "#TextColor#"]
IfFalseAction=[!SetOption BtnLayoutWeather Shape "Rectangle 0,0,86,24,6 | Fill Color 255,255,255,12 | StrokeWidth 1 | Stroke Color #PanelEdge#"][!SetOption TxtLayoutWeather FontColor "#MutedText#"]
IfConditionMode=1
DynamicVariables=1

[MeasureLayoutCompactActive]
Measure=Calc
Formula=(#LayoutId#=3) ? 1 : 0
IfCondition=(MeasureLayoutCompactActive=1)
IfTrueAction=[!SetOption BtnLayoutCompact Shape "Rectangle 0,0,86,24,6 | Fill Color #AccentSoft# | StrokeWidth 1 | Stroke Color #Accent#"][!SetOption TxtLayoutCompact FontColor "#TextColor#"]
IfFalseAction=[!SetOption BtnLayoutCompact Shape "Rectangle 0,0,86,24,6 | Fill Color 255,255,255,12 | StrokeWidth 1 | Stroke Color #PanelEdge#"][!SetOption TxtLayoutCompact FontColor "#MutedText#"]
IfConditionMode=1
DynamicVariables=1

[MeterPanel]
