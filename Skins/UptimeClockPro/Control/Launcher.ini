[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
ContextTitle=Close Control
ContextAction=[!DeactivateConfig "#ROOTCONFIG#\Control"]
Group=UptimeClockPro

[Metadata]
Name=Uptime Clock Pro - Control
Author=PetersMinistry
Information=Launcher for the Uptime Clock Pro suite modules.
Version=0.1.0
License=MIT

[Variables]
FontDisplay=Segoe UI Semilight
FontText=Segoe UI Semilight
TextColor=245,247,252,246
MutedText=165,174,188,224
SoftText=205,212,224,238
PanelFill=5,9,15,184
PanelEdge=255,255,255,36
PanelEdgeStrong=255,255,255,58
Accent=255,215,30,255
AccentSoft=255,215,30,76
Shadow=0,0,0,130

[StylePanelText]
FontFace=#FontText#
FontColor=#TextColor#
AntiAlias=1

[StyleValue]
MeterStyle=StylePanelText
FontSize=20
FontWeight=400
FontColor=#TextColor#

[StyleSmall]
MeterStyle=StylePanelText
FontSize=10
FontColor=#SoftText#

[StyleTiny]
MeterStyle=StylePanelText
FontSize=8
FontColor=#MutedText#

[MeterPanel]
Meter=Shape
X=1
Y=1
Shape=Rectangle 0,0,300,212,8 | Fill Color #PanelFill# | StrokeWidth 1 | Stroke Color #PanelEdgeStrong#
Shape2=Rectangle 16,18,3,32,2 | Fill Color #Accent# | StrokeWidth 0

[MeterTitle]
Meter=String
MeterStyle=StyleValue
X=30
Y=14
W=230
H=28
FontFace=#FontDisplay#
FontSize=18
FontWeight=400
FontColor=#TextColor#
Text=Uptime Clock Pro

[MeterSubtitle]
Meter=String
MeterStyle=StyleTiny
X=30
Y=40
W=230
H=14
Text=Load the desktop pieces you want

[BtnClock]
Meter=Shape
X=18
Y=70
Shape=Rectangle 0,0,80,28,6 | Fill Color 255,255,255,18 | StrokeWidth 1 | Stroke Color #PanelEdge#
MouseOverAction=[!SetOption BtnClock Shape "Rectangle 0,0,80,28,6 | Fill Color 255,255,255,32 | StrokeWidth 1 | Stroke Color 255,255,255,70"][!UpdateMeter BtnClock][!Redraw]
MouseLeaveAction=[!SetOption BtnClock Shape "Rectangle 0,0,80,28,6 | Fill Color 255,255,255,18 | StrokeWidth 1 | Stroke Color #PanelEdge#"][!UpdateMeter BtnClock][!Redraw]
LeftMouseUpAction=[!ActivateConfig "#ROOTCONFIG#\Clock" "Anchor.ini"]

[TxtClock]
Meter=String
MeterStyle=StyleSmall
X=58
Y=76
W=70
H=16
StringAlign=Center
Text=Clock
LeftMouseUpAction=[!ActivateConfig "#ROOTCONFIG#\Clock" "Anchor.ini"]

[BtnUptime]
Meter=Shape
X=110
Y=70
Shape=Rectangle 0,0,80,28,6 | Fill Color 255,255,255,18 | StrokeWidth 1 | Stroke Color #PanelEdge#
MouseOverAction=[!SetOption BtnUptime Shape "Rectangle 0,0,80,28,6 | Fill Color 255,255,255,32 | StrokeWidth 1 | Stroke Color 255,255,255,70"][!UpdateMeter BtnUptime][!Redraw]
MouseLeaveAction=[!SetOption BtnUptime Shape "Rectangle 0,0,80,28,6 | Fill Color 255,255,255,18 | StrokeWidth 1 | Stroke Color #PanelEdge#"][!UpdateMeter BtnUptime][!Redraw]
LeftMouseUpAction=[!ActivateConfig "#ROOTCONFIG#\Uptime" "Session.ini"]

[TxtUptime]
Meter=String
MeterStyle=StyleSmall
X=150
Y=76
W=70
H=16
StringAlign=Center
Text=Uptime
LeftMouseUpAction=[!ActivateConfig "#ROOTCONFIG#\Uptime" "Session.ini"]

[BtnPulse]
Meter=Shape
X=202
Y=70
Shape=Rectangle 0,0,80,28,6 | Fill Color 255,255,255,18 | StrokeWidth 1 | Stroke Color #PanelEdge#
MouseOverAction=[!SetOption BtnPulse Shape "Rectangle 0,0,80,28,6 | Fill Color 255,255,255,32 | StrokeWidth 1 | Stroke Color 255,255,255,70"][!UpdateMeter BtnPulse][!Redraw]
MouseLeaveAction=[!SetOption BtnPulse Shape "Rectangle 0,0,80,28,6 | Fill Color 255,255,255,18 | StrokeWidth 1 | Stroke Color #PanelEdge#"][!UpdateMeter BtnPulse][!Redraw]
LeftMouseUpAction=[!ActivateConfig "#ROOTCONFIG#\System" "Pulse.ini"]

[TxtPulse]
Meter=String
MeterStyle=StyleSmall
X=242
Y=76
W=70
H=16
StringAlign=Center
Text=Pulse
LeftMouseUpAction=[!ActivateConfig "#ROOTCONFIG#\System" "Pulse.ini"]

[BtnWeather]
Meter=Shape
X=18
Y=106
Shape=Rectangle 0,0,264,28,6 | Fill Color 255,255,255,14 | StrokeWidth 1 | Stroke Color #PanelEdge#
MouseOverAction=[!SetOption BtnWeather Shape "Rectangle 0,0,264,28,6 | Fill Color 255,255,255,28 | StrokeWidth 1 | Stroke Color 255,255,255,70"][!UpdateMeter BtnWeather][!Redraw]
MouseLeaveAction=[!SetOption BtnWeather Shape "Rectangle 0,0,264,28,6 | Fill Color 255,255,255,14 | StrokeWidth 1 | Stroke Color #PanelEdge#"][!UpdateMeter BtnWeather][!Redraw]
LeftMouseUpAction=[!ActivateConfig "#ROOTCONFIG#\Weather" "Current.ini"]

[TxtWeather]
Meter=String
MeterStyle=StyleSmall
X=150
Y=112
W=240
H=16
StringAlign=Center
Text=Weather
LeftMouseUpAction=[!ActivateConfig "#ROOTCONFIG#\Weather" "Current.ini"]

[BtnLoadAll]
Meter=Shape
X=18
Y=154
Shape=Rectangle 0,0,126,28,6 | Fill Color #AccentSoft# | StrokeWidth 1 | Stroke Color #Accent#
LeftMouseUpAction=[!ActivateConfig "#ROOTCONFIG#\Clock" "Anchor.ini"][!ActivateConfig "#ROOTCONFIG#\Uptime" "Session.ini"][!ActivateConfig "#ROOTCONFIG#\System" "Pulse.ini"][!ActivateConfig "#ROOTCONFIG#\Weather" "Current.ini"]

[TxtLoadAll]
Meter=String
MeterStyle=StyleSmall
X=81
Y=160
W=110
H=16
StringAlign=Center
Text=Load Suite
LeftMouseUpAction=[!ActivateConfig "#ROOTCONFIG#\Clock" "Anchor.ini"][!ActivateConfig "#ROOTCONFIG#\Uptime" "Session.ini"][!ActivateConfig "#ROOTCONFIG#\System" "Pulse.ini"][!ActivateConfig "#ROOTCONFIG#\Weather" "Current.ini"]

[BtnCloseAll]
Meter=Shape
X=156
Y=154
Shape=Rectangle 0,0,126,28,6 | Fill Color 255,255,255,14 | StrokeWidth 1 | Stroke Color #PanelEdge#
LeftMouseUpAction=[!DeactivateConfig "#ROOTCONFIG#\Clock"][!DeactivateConfig "#ROOTCONFIG#\Uptime"][!DeactivateConfig "#ROOTCONFIG#\System"][!DeactivateConfig "#ROOTCONFIG#\Weather"]

[TxtCloseAll]
Meter=String
MeterStyle=StyleSmall
X=219
Y=160
W=110
H=16
StringAlign=Center
Text=Close Pieces
LeftMouseUpAction=[!DeactivateConfig "#ROOTCONFIG#\Clock"][!DeactivateConfig "#ROOTCONFIG#\Uptime"][!DeactivateConfig "#ROOTCONFIG#\System"][!DeactivateConfig "#ROOTCONFIG#\Weather"]

[MeterFooter]
Meter=String
MeterStyle=StyleTiny
X=30
Y=190
W=238
H=14
Text=Prototype package shape: UptimeClockPro
