[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
ContextTitle=Close Control
ContextAction=[!DeactivateConfig "#ROOTCONFIG#\Control"]
Group=UptimeClockPro

[Metadata]
Name=Uptime Clock Pro - Control
Author=PetersMinistry
Information=Launcher for the integrated Uptime Clock Pro clock/weather anchor.
Version=0.2.0
License=MIT

[Variables]
FontText=Segoe UI Semilight
TextColor=245,247,252,246
MutedText=165,174,188,224
SoftText=205,212,224,238
PanelFill=5,9,15,184
PanelEdge=255,255,255,42
PanelEdgeStrong=255,255,255,62
Accent=255,215,30,255
AccentSoft=255,215,30,76

[StyleText]
FontFace=#FontText#
FontColor=#TextColor#
AntiAlias=1

[StyleSmall]
MeterStyle=StyleText
FontSize=10
FontColor=#SoftText#

[StyleTiny]
MeterStyle=StyleText
FontSize=8
FontColor=#MutedText#

[MeterPanel]
Meter=Shape
X=1
Y=1
Shape=Rectangle 0,0,286,138,8 | Fill Color #PanelFill# | StrokeWidth 1 | Stroke Color #PanelEdgeStrong#
Shape2=Rectangle 16,18,3,34,2 | Fill Color #Accent# | StrokeWidth 0

[MeterTitle]
Meter=String
MeterStyle=StyleText
X=30
Y=15
W=232
H=28
FontSize=18
FontWeight=400
Text=Uptime Clock Pro

[MeterSubtitle]
Meter=String
MeterStyle=StyleTiny
X=30
Y=42
W=238
H=14
Text=Clock and weather anchor

[BtnLoad]
Meter=Shape
X=18
Y=72
Shape=Rectangle 0,0,120,30,6 | Fill Color #AccentSoft# | StrokeWidth 1 | Stroke Color #Accent#
MouseOverAction=[!SetOption BtnLoad Shape "Rectangle 0,0,120,30,6 | Fill Color 255,215,30,110 | StrokeWidth 1 | Stroke Color #Accent#"][!UpdateMeter BtnLoad][!Redraw]
MouseLeaveAction=[!SetOption BtnLoad Shape "Rectangle 0,0,120,30,6 | Fill Color #AccentSoft# | StrokeWidth 1 | Stroke Color #Accent#"][!UpdateMeter BtnLoad][!Redraw]
LeftMouseUpAction=[!ActivateConfig "#ROOTCONFIG#\Clock" "Anchor.ini"]

[TxtLoad]
Meter=String
MeterStyle=StyleSmall
X=78
Y=79
W=100
H=16
StringAlign=Center
Text=Load Clock
LeftMouseUpAction=[!ActivateConfig "#ROOTCONFIG#\Clock" "Anchor.ini"]

[BtnRefresh]
Meter=Shape
X=150
Y=72
Shape=Rectangle 0,0,118,30,6 | Fill Color 255,255,255,16 | StrokeWidth 1 | Stroke Color #PanelEdge#
MouseOverAction=[!SetOption BtnRefresh Shape "Rectangle 0,0,118,30,6 | Fill Color 255,255,255,30 | StrokeWidth 1 | Stroke Color 255,255,255,70"][!UpdateMeter BtnRefresh][!Redraw]
MouseLeaveAction=[!SetOption BtnRefresh Shape "Rectangle 0,0,118,30,6 | Fill Color 255,255,255,16 | StrokeWidth 1 | Stroke Color #PanelEdge#"][!UpdateMeter BtnRefresh][!Redraw]
LeftMouseUpAction=[!UpdateMeasure MeasureWeatherRaw "#ROOTCONFIG#\Clock"][!UpdateMeasureGroup WeatherLogic "#ROOTCONFIG#\Clock"][!UpdateMeter * "#ROOTCONFIG#\Clock"][!Redraw "#ROOTCONFIG#\Clock"]

[TxtRefresh]
Meter=String
MeterStyle=StyleSmall
X=209
Y=79
W=100
H=16
StringAlign=Center
Text=Refresh
LeftMouseUpAction=[!UpdateMeasure MeasureWeatherRaw "#ROOTCONFIG#\Clock"][!UpdateMeasureGroup WeatherLogic "#ROOTCONFIG#\Clock"][!UpdateMeter * "#ROOTCONFIG#\Clock"][!Redraw "#ROOTCONFIG#\Clock"]

[BtnClose]
Meter=Shape
X=18
Y=108
Shape=Rectangle 0,0,250,22,6 | Fill Color 255,255,255,12 | StrokeWidth 1 | Stroke Color #PanelEdge#
LeftMouseUpAction=[!DeactivateConfig "#ROOTCONFIG#\Clock"]

[TxtClose]
Meter=String
MeterStyle=StyleTiny
X=143
Y=113
W=230
H=12
StringAlign=Center
Text=Close clock anchor
LeftMouseUpAction=[!DeactivateConfig "#ROOTCONFIG#\Clock"]
