[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
ContextTitle=Open Uptime Clock Pro Control
ContextAction=[!ActivateConfig "#ROOTCONFIG#\Control" "Launcher.ini"]
ContextTitle2=Refresh
ContextAction2=[!Refresh "#CURRENTCONFIG#"]
Group=UptimeClockPro

[Metadata]
Name=Uptime Clock Pro - Session
Author=PetersMinistry
Information=Compact uptime/session module for the Uptime Clock Pro suite.
Version=0.1.0
License=MIT

[Variables]
FontDisplay=Segoe UI Semilight
FontText=Segoe UI Semilight
TextColor=245,247,252,246
MutedText=165,174,188,224
SoftText=205,212,224,238
PanelFill=5,9,15,184
PanelEdge=255,255,255,36
Good=42,232,139,255
Warn=255,190,80,255
Shadow=0,0,0,130
SessionTone=42,232,139,255
SessionLabel=steady

[StylePanelText]
FontFace=#FontText#
FontColor=#TextColor#
AntiAlias=1

[StyleLabel]
MeterStyle=StylePanelText
FontSize=10
FontWeight=400
FontColor=#MutedText#

[StyleValue]
MeterStyle=StylePanelText
FontSize=20
FontWeight=400

[StyleSmall]
MeterStyle=StylePanelText
FontSize=10
FontColor=#SoftText#

[StyleTiny]
MeterStyle=StylePanelText
FontSize=8
FontColor=#MutedText#

[MeasureUptimeRaw]
Measure=Uptime
UpdateDivider=10

[MeasureUptimeText]
Measure=Uptime
Format="%4!i!d %3!i!h %2!i!m"
UpdateDivider=10

[MeasureUptimeHours]
Measure=Calc
Formula=Floor(MeasureUptimeRaw / 3600)
DynamicVariables=1

[MeasureDayProgress]
Measure=Calc
Formula=(MeasureUptimeRaw - (Floor(MeasureUptimeRaw / 86400) * 86400))
MinValue=0
MaxValue=86400
DynamicVariables=1

[MeasureSessionState]
Measure=Calc
Formula=MeasureUptimeHours
IfCondition=(MeasureUptimeHours >= 72)
IfTrueAction=[!SetVariable SessionTone "#Warn#"][!SetVariable SessionLabel "long run"]
IfFalseAction=[!SetVariable SessionTone "#Good#"][!SetVariable SessionLabel "steady"]
DynamicVariables=1

[MeterPanel]
Meter=Shape
X=1
Y=1
Shape=Rectangle 0,0,256,112,8 | Fill Color #PanelFill# | StrokeWidth 1 | Stroke Color #PanelEdge#
Shape2=Rectangle 14,16,3,32,2 | Fill Color #SessionTone# | StrokeWidth 0
DynamicVariables=1

[MeterLabel]
Meter=String
MeterStyle=StyleLabel
X=30
Y=14
W=130
H=16
FontFace=#FontDisplay#
FontSize=11
FontWeight=400
Text=System uptime

[MeterPill]
Meter=Shape
X=166
Y=14
Shape=Rectangle 0,0,70,18,9 | Fill Color 255,255,255,18 | StrokeWidth 1 | Stroke Color #PanelEdge#

[MeterPillText]
Meter=String
MeterStyle=StyleTiny
X=201
Y=17
W=64
H=12
StringAlign=Center
Text=#SessionLabel#
DynamicVariables=1

[MeterValue]
Meter=String
MeterStyle=StyleValue
MeasureName=MeasureUptimeText
X=30
Y=40
W=180
H=34
FontSize=19
FontColor=#TextColor#
Text=%1

[MeterSub]
Meter=String
MeterStyle=StyleSmall
X=30
Y=76
W=190
H=20
Text=Since last restart

[MeterRingTrack]
Meter=Roundline
MeasureName=MeasureDayProgress
X=196
Y=43
W=42
H=42
StartAngle=(Rad(270))
RotationAngle=(Rad(360))
LineStart=17
LineLength=20
LineColor=255,255,255,28
Solid=1
AntiAlias=1

[MeterRing]
Meter=Roundline
MeasureName=MeasureDayProgress
X=196
Y=43
W=42
H=42
StartAngle=(Rad(270))
RotationAngle=(Rad(360))
LineStart=17
LineLength=20
LineColor=#SessionTone#
Solid=1
AntiAlias=1
DynamicVariables=1
