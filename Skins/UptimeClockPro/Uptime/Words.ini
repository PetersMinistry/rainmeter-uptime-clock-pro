[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
ContextTitle=Close Uptime Words
ContextAction=[!DeactivateConfig "#ROOTCONFIG#\Uptime"]
Group=UptimeClockPro

[Metadata]
Name=Uptime Clock Pro - Uptime Words
Author=PetersMinistry
Information=Optional text-only uptime module for placing independently beside the clock.
Version=0.1.0
License=MIT

[Variables]
FontText=Segoe UI Semilight
TextColor=245,247,252,246
MutedText=174,182,195,230
Accent=255,215,30,220
Shadow=0,0,0,150

[MeasureUptime]
Measure=Uptime
Format="Up %4!i! days %3!i!h %2!i!m"

[MeterAccent]
Meter=Shape
X=0
Y=41
Shape=Rectangle 0,0,82,1,1 | Fill Color #Accent# | StrokeWidth 0

[MeterUptimeWords]
Meter=String
MeasureName=MeasureUptime
X=0
Y=0
W=420
H=54
FontColor=#TextColor#
FontFace=#FontText#
FontSize=18
FontWeight=300
StringAlign=Left
AntiAlias=1
StringEffect=Shadow
FontEffectColor=#Shadow#
Text=%1

[MeterCaption]
Meter=String
X=4
Y=48
W=230
H=18
FontFace=#FontText#
FontColor=#MutedText#
FontSize=9
AntiAlias=1
Text=since last restart
