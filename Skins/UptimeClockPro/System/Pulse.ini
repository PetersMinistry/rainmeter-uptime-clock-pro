[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
ContextTitle=Open Uptime Clock Pro Control
ContextAction=[!ActivateConfig "#ROOTCONFIG#\Control" "Launcher.ini"]
ContextTitle2=Refresh
ContextAction2=[!Refresh "#CURRENTCONFIG#"]
Group=UptimeClockPro

[Metadata]
Name=Uptime Clock Pro - System Pulse
Author=PetersMinistry
Information=Small CPU and memory pulse module for the Uptime Clock Pro suite.
Version=0.1.0
License=MIT

[Variables]
FontDisplay=Segoe UI Semilight
FontText=Segoe UI Semilight
TextColor=245,247,252,246
MutedText=165,174,188,224
SoftText=205,212,224,238
PanelFill=5,9,15,184
PanelEdge=255,255,255,36
Good=42,232,139,255
Blue=82,160,255,255
Shadow=0,0,0,130

[StylePanelText]
FontFace=#FontText#
FontColor=#TextColor#
AntiAlias=1

[StyleLabel]
MeterStyle=StylePanelText
FontSize=10
FontWeight=400
FontColor=#MutedText#

[StyleSmall]
MeterStyle=StylePanelText
FontSize=10
FontColor=#SoftText#

[StyleTiny]
MeterStyle=StylePanelText
FontSize=8
FontColor=#MutedText#

[MeasureCPU]
Measure=CPU
Processor=0

[MeasureRAM]
Measure=PhysicalMemory

[MeterPanel]
Meter=Shape
X=1
Y=1
Shape=Rectangle 0,0,278,112,8 | Fill Color #PanelFill# | StrokeWidth 1 | Stroke Color #PanelEdge#
Shape2=Rectangle 14,16,3,32,2 | Fill Color #Blue# | StrokeWidth 0

[MeterLabel]
Meter=String
MeterStyle=StyleLabel
X=30
Y=14
W=150
H=16
FontFace=#FontDisplay#
FontSize=11
FontWeight=400
Text=Machine pulse

[MeterCpuLabel]
Meter=String
MeterStyle=StyleTiny
X=30
Y=44
W=48
H=14
Text=CPU

[MeterCpuValue]
Meter=String
MeterStyle=StyleSmall
MeasureName=MeasureCPU
X=236
Y=42
W=34
H=18
StringAlign=Right
Text=%1%
Percentual=1

[MeterCpuTrack]
Meter=Shape
X=70
Y=49
Shape=Rectangle 0,0,145,5,3 | Fill Color 255,255,255,26 | StrokeWidth 0

[MeterCpuBar]
Meter=Bar
MeasureName=MeasureCPU
X=70
Y=49
W=145
H=5
BarColor=#Good#
BarOrientation=Horizontal

[MeterRamLabel]
Meter=String
MeterStyle=StyleTiny
X=30
Y=75
W=48
H=14
Text=RAM

[MeterRamValue]
Meter=String
MeterStyle=StyleSmall
MeasureName=MeasureRAM
X=236
Y=73
W=34
H=18
StringAlign=Right
Text=%1%
Percentual=1

[MeterRamTrack]
Meter=Shape
X=70
Y=80
Shape=Rectangle 0,0,145,5,3 | Fill Color 255,255,255,26 | StrokeWidth 0

[MeterRamBar]
Meter=Bar
MeasureName=MeasureRAM
X=70
Y=80
W=145
H=5
BarColor=#Blue#
BarOrientation=Horizontal
