[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
ContextTitle=Open Uptime Clock Pro Control
ContextAction=[!ActivateConfig "#ROOTCONFIG#\Control" "Launcher.ini"]
ContextTitle2=Refresh Weather
ContextAction2=[!UpdateMeasure MeasureWeatherRaw][!UpdateMeter *][!Redraw]
Group=UptimeClockPro

[Metadata]
Name=Uptime Clock Pro - Weather
Author=PetersMinistry
Information=Compact current weather module for the Uptime Clock Pro suite.
Version=0.1.0
License=MIT

[Variables]
WeatherLatitude=40.7128
WeatherLongitude=-74.0060
WeatherURL=https://api.open-meteo.com/v1/forecast?latitude=#WeatherLatitude#&longitude=#WeatherLongitude#&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=auto&forecast_days=1
FontDisplay=Segoe UI Semilight
FontText=Segoe UI Semilight
TextColor=245,247,252,246
MutedText=165,174,188,224
SoftText=205,212,224,238
PanelFill=5,9,15,184
PanelEdge=255,255,255,36
Accent=255,215,30,255
Blue=82,160,255,255
Shadow=0,0,0,130

[StylePanelText]
FontFace=#FontText#
FontColor=#TextColor#
AntiAlias=1

[StyleLabel]
MeterStyle=StylePanelText
FontSize=10
FontWeight=400
FontColor=#MutedText#

[StyleSmall]
MeterStyle=StylePanelText
FontSize=10
FontColor=#SoftText#

[StyleTiny]
MeterStyle=StylePanelText
FontSize=8
FontColor=#MutedText#

[MeasureWeatherRaw]
Measure=WebParser
URL=#WeatherURL#
UpdateRate=900
RegExp=(?siU).*"temperature_2m":([0-9.\-]+).*"relative_humidity_2m":([0-9.\-]+).*"apparent_temperature":([0-9.\-]+).*"precipitation":([0-9.\-]+).*"weather_code":([0-9]+).*"wind_speed_10m":([0-9.\-]+).*
StringIndex=1
UserAgent=Mozilla/5.0
DynamicVariables=1

[MeasureTemp]
Measure=WebParser
URL=[MeasureWeatherRaw]
StringIndex=1
Substitute="^$":"--"

[MeasureHumidity]
Measure=WebParser
URL=[MeasureWeatherRaw]
StringIndex=2
Substitute="^$":"--"

[MeasureFeels]
Measure=WebParser
URL=[MeasureWeatherRaw]
StringIndex=3
Substitute="^$":"--"

[MeasurePrecip]
Measure=WebParser
URL=[MeasureWeatherRaw]
StringIndex=4
Substitute="^$":"--"

[MeasureWeatherCode]
Measure=WebParser
URL=[MeasureWeatherRaw]
StringIndex=5
Substitute="0":"Clear","1":"Mainly clear","2":"Partly cloudy","3":"Cloudy","45":"Fog","48":"Rime fog","51":"Light drizzle","53":"Drizzle","55":"Heavy drizzle","61":"Light rain","63":"Rain","65":"Heavy rain","71":"Light snow","73":"Snow","75":"Heavy snow","80":"Rain showers","81":"Showers","82":"Heavy showers","95":"Thunderstorm","96":"Storm + hail","99":"Storm + hail","^$":"Weather"

[MeasureWind]
Measure=WebParser
URL=[MeasureWeatherRaw]
StringIndex=6
Substitute="^$":"--"

[MeterPanel]
Meter=Shape
X=1
Y=1
Shape=Rectangle 0,0,278,112,8 | Fill Color #PanelFill# | StrokeWidth 1 | Stroke Color #PanelEdge#
Shape2=Rectangle 14,16,3,32,2 | Fill Color #Accent# | StrokeWidth 0

[MeterLabel]
Meter=String
MeterStyle=StyleLabel
X=30
Y=14
W=150
H=16
FontFace=#FontDisplay#
FontSize=11
FontWeight=400
Text=Weather bit

[MeterSun]
Meter=Shape
X=214
Y=18
Shape=Ellipse 0,0,24,24 | Fill Color #Accent# | StrokeWidth 0

[MeterTemp]
Meter=String
MeterStyle=StylePanelText
MeasureName=MeasureTemp
X=30
Y=42
W=72
H=38
FontSize=26
FontWeight=400
Text=%1F

[MeterCondition]
Meter=String
MeterStyle=StyleSmall
MeasureName=MeasureWeatherCode
X=108
Y=45
W=138
H=18
ClipString=1
Text=%1

[MeterDetails]
Meter=String
MeterStyle=StyleTiny
MeasureName=MeasureFeels
MeasureName2=MeasureHumidity
MeasureName3=MeasureWind
MeasureName4=MeasurePrecip
X=108
Y=68
W=150
H=16
Text=Feels %1F   Hum %2%   Wind %3 mph
ClipString=1

[MeterFooter]
Meter=String
MeterStyle=StyleTiny
X=30
Y=92
W=216
H=12
Text=Open-Meteo. No API key.
