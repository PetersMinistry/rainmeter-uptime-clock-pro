[MeterPanel]
Meter=Shape
X=1
Y=1
Shape=Rectangle 0,0,262,352,8 | Fill Color #PanelFill# | StrokeWidth 1 | Stroke Color #PanelEdgeStrong#
Shape2=Rectangle 16,18,3,34,2 | Fill Color #Accent# | StrokeWidth 0

[MeterTitle]
Meter=String
MeterStyle=StyleText
X=30
Y=15
W=190
H=24
FontSize=16
FontWeight=400
Text=#LangLanguagePicker#
DynamicVariables=1

[BtnClose]
Meter=Shape
X=226
Y=18
Shape=Rectangle 0,0,20,20,5 | Fill Color 255,255,255,12 | StrokeWidth 1 | Stroke Color #PanelEdge#
LeftMouseUpAction=[!DeactivateConfig "#ROOTCONFIG#\Language"]

[TxtClose]
Meter=String
MeterStyle=StyleTiny
X=236
Y=22
W=16
H=12
StringAlign=Center
Text=X
LeftMouseUpAction=[!DeactivateConfig "#ROOTCONFIG#\Language"]

[BtnLangEnglish]
Meter=Shape
X=21
Y=60
Shape=Rectangle 0,0,220,34,7 | Fill Color 255,255,255,12 | StrokeWidth 1 | Stroke Color #PanelEdge#
LeftMouseUpAction=[!WriteKeyValue Variables Language "en" "#SettingsInc#"][!WriteKeyValue Variables LanguageId "1" "#SettingsInc#"][!Refresh "#ROOTCONFIG#\Clock"][!Refresh "#ROOTCONFIG#\Control"][!Refresh "#ROOTCONFIG#\Uptime"][!Refresh "#ROOTCONFIG#\Language"]

