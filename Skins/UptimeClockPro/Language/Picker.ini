[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
ContextTitle=#LangControlContextClose#
ContextAction=[!DeactivateConfig "#ROOTCONFIG#\Language"]
Group=UptimeClockPro

[Metadata]
Name=Uptime Clock Pro - Language Picker
Author=PetersMinistry
Information=Language selection popup for Uptime Clock Pro.
Version=0.6.1
License=MIT

[Variables]
FontText=Segoe UI Semilight
TextColor=245,247,252,246
MutedText=165,174,188,224
SoftText=205,212,224,238
PanelFill=5,9,15,244
PanelEdge=255,255,255,44
PanelEdgeStrong=255,255,255,68
Accent=255,215,30,255
AccentSoft=255,215,30,76
Language=en
LanguageId=1
SettingsInc=#@#UserSettings.inc
@Include=#SettingsInc#
@IncludeLanguage=#@#Languages\#Language#.inc

[StyleText]
FontFace=#FontText#
FontColor=#TextColor#
AntiAlias=1

[StyleSmall]
MeterStyle=StyleText
FontSize=10
FontColor=#SoftText#

[StyleTiny]
MeterStyle=StyleText
FontSize=8
FontColor=#MutedText#

[MeasureLanguageEnglishActive]
Measure=Calc
Formula=(#LanguageId#=1) ? 1 : 0
IfCondition=(MeasureLanguageEnglishActive=1)
IfTrueAction=[!SetOption BtnLangEnglish Shape "Rectangle 0,0,220,34,7 | Fill Color #AccentSoft# | StrokeWidth 1 | Stroke Color #Accent#"][!SetOption TxtLangEnglish FontColor "#TextColor#"]
IfFalseAction=[!SetOption BtnLangEnglish Shape "Rectangle 0,0,220,34,7 | Fill Color 255,255,255,12 | StrokeWidth 1 | Stroke Color #PanelEdge#"][!SetOption TxtLangEnglish FontColor "#SoftText#"]
IfConditionMode=1
DynamicVariables=1

[MeasureLanguageRussianActive]
Measure=Calc
Formula=(#LanguageId#=2) ? 1 : 0
IfCondition=(MeasureLanguageRussianActive=1)
IfTrueAction=[!SetOption BtnLangRussian Shape "Rectangle 0,0,220,34,7 | Fill Color #AccentSoft# | StrokeWidth 1 | Stroke Color #Accent#"][!SetOption TxtLangRussian FontColor "#TextColor#"]
IfFalseAction=[!SetOption BtnLangRussian Shape "Rectangle 0,0,220,34,7 | Fill Color 255,255,255,12 | StrokeWidth 1 | Stroke Color #PanelEdge#"][!SetOption TxtLangRussian FontColor "#SoftText#"]
IfConditionMode=1
DynamicVariables=1

