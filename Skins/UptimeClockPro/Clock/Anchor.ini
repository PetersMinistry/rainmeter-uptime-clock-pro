X=438
Y=4
Shape=Ellipse 0,0,48,48 | Fill Color #AccentSoft# | StrokeWidth 0
Shape2=Ellipse 31,22,16,16 | Fill Color 255,255,255,50 | StrokeWidth 0

[MeterWeatherSun]
