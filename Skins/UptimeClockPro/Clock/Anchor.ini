[MeterWeatherDetails]
Meter=String
MeasureName=MeasureFeels
MeasureName2=MeasureHumidity
MeasureName3=MeasureWind
X=440
Y=193
W=250
H=18
FontFace=#FontText#
FontColor=#MutedText#
FontSize=8
FontWeight=400
StringAlign=Left
AntiAlias=1
ClipString=1
Text=Feels %1#TemperatureSuffix#   Hum %2%   Wind %3 #WindSpeedUnit#
DynamicVariables=1
