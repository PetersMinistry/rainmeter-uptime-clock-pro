[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
ContextTitle=Open Uptime Clock Pro Control
ContextAction=[!ActivateConfig "#ROOTCONFIG#\Control" "Launcher.ini"]
ContextTitle2=Refresh Weather
ContextAction2=[!UpdateMeasure MeasureWeatherRaw][!UpdateMeasureGroup WeatherLogic][!UpdateMeter *][!Redraw]
ContextTitle3=Open Settings
ContextAction3=[!ActivateConfig "#ROOTCONFIG#\Control" "Launcher.ini"]
Group=UptimeClockPro

[Metadata]
Name=Uptime Clock Pro - Clock Weather Anchor
Author=PetersMinistry
Information=Integrated clock and current weather anchor for Uptime Clock Pro.
Version=0.3.0
License=MIT

[Variables]
FontText=Segoe UI Semilight
FontScript=WindSong
TextColor=245,247,252,246
MutedText=174,182,195,230
SoftText=218,224,235,240
Accent=255,215,30,255
AccentSoft=255,215,30,84
Cloud=225,230,236,245
CloudSoft=190,198,208,228
Rain=88,166,255,245
Snow=238,248,255,245
Storm=170,112,255,245
Fog=185,194,204,190
Ice=128,224,255,235
Wind=205,214,224,218
Shadow=0,0,0,150
@Include=#@#UserSettings.inc
WeatherURL=https://api.open-meteo.com/v1/forecast?latitude=#WeatherLatitude#&longitude=#WeatherLongitude#&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m&temperature_unit=#TemperatureUnit#&wind_speed_unit=#WindSpeedUnit#&precipitation_unit=inch&timezone=auto&forecast_days=1
LocationURL=https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=#WeatherLatitude#&lon=#WeatherLongitude#&zoom=10&addressdetails=1&accept-language=en

[MeasureTime]
Measure=Time
Format=%#I:%M %p

[MeasureDate]
Measure=Time
Format=%A, %d %B %Y

[MeasureWeatherRaw]
Measure=WebParser
URL=#WeatherURL#
UpdateRate=900
UserAgent=Mozilla/5.0
DynamicVariables=1

[MeasureTemp]
Measure=WebParser
URL=#WeatherURL#
RegExp=(?si).*"temperature_2m":(-?[0-9]+(?:\.[0-9]+)?).*
StringIndex=1
Substitute="^$":"--"
DefaultValue=--
UserAgent=Mozilla/5.0
DynamicVariables=1

[MeasureFeels]
Measure=WebParser
URL=#WeatherURL#
RegExp=(?si).*"apparent_temperature":(-?[0-9]+(?:\.[0-9]+)?).*
StringIndex=1
Substitute="^$":"--"
DefaultValue=--
UserAgent=Mozilla/5.0
DynamicVariables=1

[MeasureHumidity]
Measure=WebParser
URL=#WeatherURL#
RegExp=(?si).*"relative_humidity_2m":(-?[0-9]+(?:\.[0-9]+)?).*
StringIndex=1
Substitute="^$":"--"
DefaultValue=--
UserAgent=Mozilla/5.0
DynamicVariables=1

[MeasureWind]
Measure=WebParser
URL=#WeatherURL#
RegExp=(?si).*"wind_speed_10m":(-?[0-9]+(?:\.[0-9]+)?).*
StringIndex=1
Substitute="^$":"--"
DefaultValue=--
UserAgent=Mozilla/5.0
DynamicVariables=1

[MeasureTempDisplay]
Measure=Calc
Formula=MeasureTemp
DynamicVariables=1

[MeasureFeelsDisplay]
Measure=Calc
Formula=MeasureFeels
DynamicVariables=1

[MeasureWindDisplay]
Measure=Calc
Formula=MeasureWind
DynamicVariables=1

[MeasureWeatherCode]
Measure=WebParser
URL=#WeatherURL#
RegExp=(?si).*"weather_code":([0-9]+).*
StringIndex=1
Substitute="0":"Clear","1":"Mainly clear","2":"Partly cloudy","3":"Cloudy","45":"Fog","48":"Freezing fog","51":"Light drizzle","53":"Drizzle","55":"Heavy drizzle","56":"Freezing drizzle","57":"Freezing drizzle","61":"Light rain","63":"Rain","65":"Heavy rain","66":"Freezing rain","67":"Freezing rain","71":"Light snow","73":"Snow","75":"Heavy snow","80":"Rain showers","81":"Showers","82":"Heavy showers","95":"Thunderstorm","96":"Storm + hail","99":"Storm + hail","^$":"Weather"
DefaultValue=Weather
UserAgent=Mozilla/5.0
DynamicVariables=1

[MeasureWeatherCodeRaw]
Measure=WebParser
URL=#WeatherURL#
RegExp=(?si).*"weather_code":([0-9]+).*
StringIndex=1
Substitute="^$":"0"
DefaultValue=0
UserAgent=Mozilla/5.0
DynamicVariables=1

[MeasureWeatherReset]
Measure=Calc
Group=WeatherLogic
Formula=1
IfCondition=(MeasureWeatherReset=1)
IfTrueAction=[!SetOption MeterWeatherSceneArt ImageName "#@#Images\weather-scene-partly-cloudy.png"]
IfConditionMode=1
DynamicVariables=1

[MeasurePartly]
Measure=Calc
Group=WeatherLogic
Formula=MeasureWeatherCodeRaw=2 ? 1 : 0
IfCondition=(MeasurePartly=1)
IfTrueAction=[!SetOption MeterWeatherSceneArt ImageName "#@#Images\weather-scene-partly-cloudy.png"][!UpdateMeter MeterWeatherSceneArt][!Redraw]
IfConditionMode=1
DynamicVariables=1

[MeasureClear]
Measure=Calc
Group=WeatherLogic
Formula=(MeasureWeatherCodeRaw<=1) ? 1 : 0
IfCondition=(MeasureClear=1)
IfTrueAction=[!SetOption MeterWeatherSceneArt ImageName "#@#Images\weather-scene-clear.png"][!UpdateMeter MeterWeatherSceneArt][!Redraw]
IfConditionMode=1
DynamicVariables=1

[MeasureCloud]
Measure=Calc
Group=WeatherLogic
Formula=(MeasureWeatherCodeRaw=3) ? 1 : 0
IfCondition=(MeasureCloud=1)
IfTrueAction=[!SetOption MeterWeatherSceneArt ImageName "#@#Images\weather-scene-cloudy.png"][!UpdateMeter MeterWeatherSceneArt][!Redraw]
IfConditionMode=1
DynamicVariables=1

[MeasureFog]
Measure=Calc
Group=WeatherLogic
Formula=((MeasureWeatherCodeRaw=45) || (MeasureWeatherCodeRaw=48)) ? 1 : 0
IfCondition=(MeasureFog=1)
IfTrueAction=[!SetOption MeterWeatherSceneArt ImageName "#@#Images\weather-scene-fog.png"][!UpdateMeter MeterWeatherSceneArt][!Redraw]
IfConditionMode=1
DynamicVariables=1

[MeasureRain]
Measure=Calc
Group=WeatherLogic
Formula=((MeasureWeatherCodeRaw>=51) && (MeasureWeatherCodeRaw<=55)) || ((MeasureWeatherCodeRaw>=61) && (MeasureWeatherCodeRaw<=65)) || ((MeasureWeatherCodeRaw>=80) && (MeasureWeatherCodeRaw<=82)) ? 1 : 0
IfCondition=(MeasureRain=1)
IfTrueAction=[!SetOption MeterWeatherSceneArt ImageName "#@#Images\weather-scene-rain.png"][!UpdateMeter MeterWeatherSceneArt][!Redraw]
IfConditionMode=1
DynamicVariables=1

[MeasureIce]
Measure=Calc
Group=WeatherLogic
Formula=((MeasureWeatherCodeRaw=48) || (MeasureWeatherCodeRaw=56) || (MeasureWeatherCodeRaw=57) || (MeasureWeatherCodeRaw=66) || (MeasureWeatherCodeRaw=67)) ? 1 : 0
IfCondition=(MeasureIce=1)
IfTrueAction=[!SetOption MeterWeatherSceneArt ImageName "#@#Images\weather-scene-ice.png"][!UpdateMeter MeterWeatherSceneArt][!Redraw]
IfConditionMode=1
DynamicVariables=1

[MeasureSnow]
Measure=Calc
Group=WeatherLogic
Formula=((MeasureWeatherCodeRaw>=71) && (MeasureWeatherCodeRaw<=75)) ? 1 : 0
IfCondition=(MeasureSnow=1)
IfTrueAction=[!SetOption MeterWeatherSceneArt ImageName "#@#Images\weather-scene-snow.png"][!UpdateMeter MeterWeatherSceneArt][!Redraw]
IfConditionMode=1
DynamicVariables=1

[MeasureStorm]
Measure=Calc
Group=WeatherLogic
Formula=(MeasureWeatherCodeRaw>=95) ? 1 : 0
IfCondition=(MeasureStorm=1)
IfTrueAction=[!SetOption MeterWeatherSceneArt ImageName "#@#Images\weather-scene-storm.png"][!UpdateMeter MeterWeatherSceneArt][!Redraw]
IfConditionMode=1
DynamicVariables=1

