[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
ContextTitle=Open Uptime Clock Pro Control
ContextAction=[!ActivateConfig "#ROOTCONFIG#\Control" "Launcher.ini"]
ContextTitle2=Refresh
ContextAction2=[!Refresh "#CURRENTCONFIG#"]
Group=UptimeClockPro

[Metadata]
Name=Uptime Clock Pro - Clock Anchor
Author=PetersMinistry
Information=Minimal time, date, and uptime anchor for the Uptime Clock Pro suite.
Version=0.1.0
License=MIT

[Variables]
FontDisplay=Segoe UI Semilight
FontText=Segoe UI Semilight
FontScript=WindSong
TextColor=245,247,252,246
MutedText=165,174,188,224
Accent=255,215,30,255
AccentSoft=255,215,30,76
Shadow=0,0,0,130

[MeasureTime]
Measure=Time
Format=%#I:%M %p

[MeasureDate]
Measure=Time
Format=%A, %d %B %Y

[MeasureUptime]
Measure=Uptime
Format="Up %4!i! days %3!i!h %2!i!m"
UpdateDivider=10

[MeterTime]
Meter=String
MeasureName=MeasureTime
X=230
Y=0
W=520
H=118
FontFace=#FontScript#
FontColor=#TextColor#
FontSize=78
StringAlign=Center
ClipString=0
StringCase=Lower
AntiAlias=1
StringEffect=Shadow
FontEffectColor=0,0,0,150

[MeterDate]
Meter=String
MeasureName=MeasureDate
X=230
Y=111
W=430
H=28
FontFace=#FontText#
FontColor=#TextColor#
FontSize=17
FontWeight=500
StringAlign=Center
AntiAlias=1
StringEffect=Shadow
FontEffectColor=#Shadow#

[MeterUptime]
Meter=String
MeasureName=MeasureUptime
X=230
Y=142
W=430
H=22
FontFace=#FontText#
FontColor=#MutedText#
FontSize=12
FontWeight=500
StringAlign=Center
AntiAlias=1
StringEffect=Shadow
FontEffectColor=#Shadow#

[MeterLeftTick]
Meter=Shape
X=52
Y=127
Shape=Rectangle 0,0,28,2,1 | Fill Color #AccentSoft# | StrokeWidth 0

[MeterRightTick]
Meter=Shape
X=380
Y=127
Shape=Rectangle 0,0,28,2,1 | Fill Color #AccentSoft# | StrokeWidth 0
