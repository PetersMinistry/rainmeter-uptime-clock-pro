Shape2=Ellipse 22,-12,34,34 | Fill Color #Cloud# | StrokeWidth 0
Shape3=Ellipse 53,3,24,24 | Fill Color #Cloud# | StrokeWidth 0
Shape4=Rectangle 0,12,78,28,14 | Fill Color #Cloud# | StrokeWidth 0
Hidden=1

[MeterWeatherCloudShade]
Meter=Shape
Group=WeatherCloud
X=441
Y=72
Shape=Rectangle 0,0,64,8,5 | Fill Color #CloudSoft# | StrokeWidth 0
Hidden=1

[MeterRainOne]
