Shape2=Rectangle 24,0,4,18,2 | Rotate -16 | Fill Color #Rain# | StrokeWidth 0
Shape3=Rectangle 48,0,4,18,2 | Rotate -16 | Fill Color #Rain# | StrokeWidth 0
Hidden=1

[MeterSnowOne]
Meter=Shape
Group=WeatherSnow
X=448
Y=92
Shape=Ellipse 0,0,4,4 | Fill Color #Snow# | StrokeWidth 0
Shape2=Ellipse 26,8,4,4 | Fill Color #Snow# | StrokeWidth 0
Shape3=Ellipse 52,0,4,4 | Fill Color #Snow# | StrokeWidth 0
Shape4=Ellipse 14,20,4,4 | Fill Color #Snow# | StrokeWidth 0
Shape5=Ellipse 40,22,4,4 | Fill Color #Snow# | StrokeWidth 0
Hidden=1

[MeterIceOne]
Meter=Shape
Group=WeatherIce
X=448
Y=90
Shape=Rectangle 0,0,5,18,2 | Fill Color #Ice# | StrokeWidth 0
Shape2=Rectangle 25,8,5,18,2 | Fill Color #Ice# | StrokeWidth 0
Shape3=Rectangle 50,0,5,18,2 | Fill Color #Ice# | StrokeWidth 0
Shape4=Ellipse 2,22,4,4 | Fill Color #Ice# | StrokeWidth 0
Shape5=Ellipse 27,31,4,4 | Fill Color #Ice# | StrokeWidth 0
Shape6=Ellipse 52,22,4,4 | Fill Color #Ice# | StrokeWidth 0
Hidden=1

[MeterStormBolt]
Meter=Shape
Group=WeatherStorm
X=473
Y=80
Shape=Path Bolt | Fill Color #Storm# | StrokeWidth 0
Bolt=0,0 | LineTo 20,0 | LineTo 8,20 | LineTo 24,20 | LineTo -2,54 | LineTo 7,27 | LineTo -9,27 | ClosePath 1
Hidden=1

[MeterFogLines]
Meter=Shape
Group=WeatherFog
X=429
Y=94
Shape=Rectangle 0,0,88,3,2 | Fill Color #Fog# | StrokeWidth 0
Shape2=Rectangle 12,13,72,3,2 | Fill Color #Fog# | StrokeWidth 0
Shape3=Rectangle 3,26,82,3,2 | Fill Color #Fog# | StrokeWidth 0
Hidden=1

[MeterWeatherTemp]
Meter=String
MeasureName=MeasureTemp
X=436
Y=127
W=230
H=44
FontFace=#FontText#
FontColor=#TextColor#
FontSize=32
FontWeight=400
StringAlign=Left
AntiAlias=1
Text=%1#TemperatureSuffix#
DynamicVariables=1

[MeterWeatherCondition]
Meter=String
MeasureName=MeasureWeatherCode
X=438
Y=167
W=230
H=28
FontFace=#FontText#
FontColor=#SoftText#
FontSize=15
FontWeight=400
StringAlign=Left
AntiAlias=1
ClipString=1
