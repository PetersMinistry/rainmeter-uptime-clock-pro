[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
ContextTitle=Open Uptime Clock Pro Control
ContextAction=[!ActivateConfig "#ROOTCONFIG#\Control" "Launcher.ini"]
ContextTitle2=Refresh Weather
ContextAction2=[!UpdateMeasure MeasureWeatherRaw][!UpdateMeasureGroup WeatherLogic][!UpdateMeter *][!Redraw]
ContextTitle3=Open Settings
ContextAction3=[!ActivateConfig "#ROOTCONFIG#\Control" "Launcher.ini"]
Group=UptimeClockPro

[Metadata]
Name=Uptime Clock Pro - Clock Weather Anchor
Author=PetersMinistry
Information=Integrated clock and current weather anchor for Uptime Clock Pro.
Version=0.2.0
License=MIT

[Variables]
FontText=Segoe UI Semilight
FontScript=WindSong
TextColor=245,247,252,246
MutedText=174,182,195,230
SoftText=218,224,235,240
Accent=255,215,30,255
AccentSoft=255,215,30,84
Cloud=225,230,236,245
CloudSoft=190,198,208,228
Rain=88,166,255,245
Snow=238,248,255,245
Storm=170,112,255,245
Fog=185,194,204,190
Ice=128,224,255,235
Wind=205,214,224,218
Shadow=0,0,0,150
WeatherLatitude=40.7128
WeatherLongitude=-74.0060
TemperatureUnit=fahrenheit
TemperatureSuffix=F
WindSpeedUnit=mph
WeatherURL=https://api.open-meteo.com/v1/forecast?latitude=#WeatherLatitude#&longitude=#WeatherLongitude#&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m&temperature_unit=#TemperatureUnit#&wind_speed_unit=#WindSpeedUnit#&precipitation_unit=inch&timezone=auto&forecast_days=1

[MeasureTime]
Measure=Time
Format=%#I:%M %p

[MeasureDate]
Measure=Time
Format=%A, %d %B %Y

[MeasureWeatherRaw]
Measure=WebParser
URL=#WeatherURL#
UpdateRate=900
RegExp=(?siU).*"temperature_2m":([0-9.\-]+).*"relative_humidity_2m":([0-9.\-]+).*"apparent_temperature":([0-9.\-]+).*"precipitation":([0-9.\-]+).*"weather_code":([0-9]+).*"wind_speed_10m":([0-9.\-]+).*
StringIndex=1
UserAgent=Mozilla/5.0
DynamicVariables=1

[MeasureTemp]
Measure=WebParser
URL=[MeasureWeatherRaw]
StringIndex=1
Substitute="^$":"--"

[MeasureFeels]
Measure=WebParser
URL=[MeasureWeatherRaw]
StringIndex=3
Substitute="^$":"--"

[MeasureHumidity]
Measure=WebParser
URL=[MeasureWeatherRaw]
StringIndex=2
Substitute="^$":"--"

[MeasureWind]
Measure=WebParser
URL=[MeasureWeatherRaw]
StringIndex=6
Substitute="^$":"--"

[MeasureWeatherCode]
Measure=WebParser
URL=[MeasureWeatherRaw]
StringIndex=5
Substitute="0":"Clear","1":"Mainly clear","2":"Partly cloudy","3":"Cloudy","45":"Fog","48":"Freezing fog","51":"Light drizzle","53":"Drizzle","55":"Heavy drizzle","56":"Freezing drizzle","57":"Freezing drizzle","61":"Light rain","63":"Rain","65":"Heavy rain","66":"Freezing rain","67":"Freezing rain","71":"Light snow","73":"Snow","75":"Heavy snow","80":"Rain showers","81":"Showers","82":"Heavy showers","95":"Thunderstorm","96":"Storm + hail","99":"Storm + hail","^$":"Weather"

[MeasureWeatherCodeRaw]
Measure=WebParser
URL=[MeasureWeatherRaw]
StringIndex=5
Substitute="^$":"0"

[MeasureWeatherReset]
Measure=Calc
Group=WeatherLogic
Formula=1
IfCondition=(MeasureWeatherReset=1)
IfTrueAction=[!HideMeterGroup WeatherSun][!HideMeterGroup WeatherCloud][!HideMeterGroup WeatherRain][!HideMeterGroup WeatherSnow][!HideMeterGroup WeatherStorm][!HideMeterGroup WeatherFog][!HideMeterGroup WeatherIce]
IfConditionMode=1
DynamicVariables=1

[MeasurePartly]
Measure=Calc
Group=WeatherLogic
Formula=MeasureWeatherCodeRaw=2 ? 1 : 0
IfCondition=(MeasurePartly=1)
IfTrueAction=[!ShowMeterGroup WeatherSun][!ShowMeterGroup WeatherCloud]
IfFalseAction=[!HideMeterGroup WeatherSun][!HideMeterGroup WeatherCloud]
IfConditionMode=1
DynamicVariables=1

[MeasureClear]
Measure=Calc
Group=WeatherLogic
Formula=(MeasureWeatherCodeRaw<=1) ? 1 : 0
IfCondition=(MeasureClear=1)
IfTrueAction=[!ShowMeterGroup WeatherSun]
IfConditionMode=1
DynamicVariables=1

[MeasureCloud]
Measure=Calc
Group=WeatherLogic
Formula=(MeasureWeatherCodeRaw=3) ? 1 : 0
IfCondition=(MeasureCloud=1)
IfTrueAction=[!ShowMeterGroup WeatherCloud]
IfConditionMode=1
DynamicVariables=1

[MeasureFog]
Measure=Calc
Group=WeatherLogic
Formula=((MeasureWeatherCodeRaw=45) || (MeasureWeatherCodeRaw=48)) ? 1 : 0
IfCondition=(MeasureFog=1)
IfTrueAction=[!ShowMeterGroup WeatherCloud][!ShowMeterGroup WeatherFog]
IfConditionMode=1
DynamicVariables=1

[MeasureRain]
Measure=Calc
Group=WeatherLogic
Formula=((MeasureWeatherCodeRaw>=51) && (MeasureWeatherCodeRaw<=65)) || ((MeasureWeatherCodeRaw>=80) && (MeasureWeatherCodeRaw<=82)) ? 1 : 0
IfCondition=(MeasureRain=1)
IfTrueAction=[!ShowMeterGroup WeatherCloud][!ShowMeterGroup WeatherRain]
IfConditionMode=1
DynamicVariables=1

[MeasureIce]
Measure=Calc
Group=WeatherLogic
Formula=((MeasureWeatherCodeRaw=48) || (MeasureWeatherCodeRaw=56) || (MeasureWeatherCodeRaw=57) || (MeasureWeatherCodeRaw=66) || (MeasureWeatherCodeRaw=67)) ? 1 : 0
IfCondition=(MeasureIce=1)
IfTrueAction=[!ShowMeterGroup WeatherCloud][!ShowMeterGroup WeatherIce]
IfConditionMode=1
DynamicVariables=1

[MeasureSnow]
Measure=Calc
Group=WeatherLogic
Formula=((MeasureWeatherCodeRaw>=71) && (MeasureWeatherCodeRaw<=75)) ? 1 : 0
IfCondition=(MeasureSnow=1)
IfTrueAction=[!ShowMeterGroup WeatherCloud][!ShowMeterGroup WeatherSnow]
IfConditionMode=1
DynamicVariables=1

[MeasureStorm]
Measure=Calc
Group=WeatherLogic
Formula=(MeasureWeatherCodeRaw>=95) ? 1 : 0
IfCondition=(MeasureStorm=1)
IfTrueAction=[!ShowMeterGroup WeatherCloud][!ShowMeterGroup WeatherRain][!ShowMeterGroup WeatherStorm]
IfConditionMode=1
DynamicVariables=1

[MeterTime]
Meter=String
MeasureName=MeasureTime
X=230
Y=-4
W=520
H=118
FontFace=#FontScript#
FontColor=#TextColor#
FontSize=78
StringAlign=Center
ClipString=0
StringCase=Lower
AntiAlias=1
StringEffect=Shadow
FontEffectColor=#Shadow#

[MeterDate]
Meter=String
MeasureName=MeasureDate
X=230
Y=105
W=430
H=30
FontFace=#FontText#
FontColor=#TextColor#
FontSize=17
FontWeight=500
StringAlign=Center
AntiAlias=1
StringEffect=Shadow
FontEffectColor=#Shadow#

[MeterLeftTick]
Meter=Shape
X=52
Y=121
Shape=Rectangle 0,0,28,2,1 | Fill Color #AccentSoft# | StrokeWidth 0

[MeterRightTick]
Meter=Shape
X=380
Y=121
Shape=Rectangle 0,0,28,2,1 | Fill Color #AccentSoft# | StrokeWidth 0

[MeterWeatherHalo]
